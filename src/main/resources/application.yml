server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/wiz_blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000        # 5 min
      max-lifetime: 1800000       # 30 min

  jpa:
    hibernate:
      ddl-auto: validate          # 生产环境用 validate，开发可用 update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      password: root
      database: 7
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 3000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT
jwt:
  secret: wiz-blog-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000            # 24 hours in ms
  refresh-expiration: 604800000   # 7 days in ms

# Logging
logging:
  level:
    com.wizv.blog: debug
    org.springframework.security: warn
